<!DOCTYPE html>
<html lang="en" data-theme="dark" data-left-handed="false">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket Dystopia</title>
  <meta name="description" content="Roll a satirical dystopian story seed. Lock traits, re-roll sections, share your build.">

  <!-- Open Graph -->
  <meta property="og:title" content="Pocket Dystopia">
  <meta property="og:description" content="Roll a satirical dystopian story seed. Lock traits, re-roll sections, share your build.">
  <meta property="og:image" content="https://classwith.nicojan.com/pocket-dystopia/og-image-v1.png">
  <meta property="og:url" content="https://classwith.nicojan.com/pocket-dystopia/">
  <meta property="twitter:card" content="summary_large_image">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Material Symbols Outlined -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>

  <!-- App -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <!-- ===== INTRO SCREEN ===== -->
  <div id="intro-screen" class="intro-screen" role="main">
    <h1 class="text-display">POCKET DYSTOPIA</h1>
    <p class="intro-subtitle text-body">
      Roll a satirical dystopian seed.<br>
      Lock what you love.<br>
      Re-roll the rest.
    </p>

    <div class="die-container" id="die-container" onclick="rollDie()" role="button" tabindex="0" aria-label="Roll the die to generate a story seed">
      <div class="die-wrapper">
        <div class="die-shape" id="die-face" aria-hidden="true"></div>
      </div>
      <p class="die-hint">tap to roll</p>
    </div>

    <div class="intro-load">
      <label for="load-input" class="sr-only">Build code</label>
      <input type="text" id="load-input" placeholder="Paste a build code to restore..." autocomplete="off" spellcheck="false">
      <button class="btn-secondary" id="load-btn" onclick="loadBuildFromInput()">
        <span class="material-symbols-outlined" aria-hidden="true">upload</span>
        Load
      </button>
      <div class="error-msg" id="load-error" role="alert" aria-live="polite"></div>
    </div>

    <div class="footer">
      built with <span aria-label="love">♥</span> by <a href="https://nicojan.com" target="_blank" rel="noopener noreferrer" class="footer-link">Nico Jan</a>
    </div>
  </div>

  <!-- ===== RESULTS SCREEN ===== -->
  <div id="results-screen" class="results-screen" aria-live="polite">
    <header class="top-bar app-container">
      <div class="top-bar-left">
        <button class="top-bar-title" type="button" onclick="confirmReset()" aria-label="Reset build and return to the home screen">POCKET DYSTOPIA</button>
      </div>
      <div class="top-bar-right">
        <button class="btn-icon btn-home-mobile" id="btn-home" onclick="confirmReset()" aria-label="Reset build and return to the home screen">
          <span class="material-symbols-outlined" aria-hidden="true">home</span>
        </button>
        <button class="btn-icon" id="btn-undo" onclick="undo()" aria-label="Undo last roll" disabled>
          <span class="material-symbols-outlined" aria-hidden="true">undo</span>
        </button>
        <button class="btn-icon" id="btn-copy" onclick="copyBuild()" aria-label="Copy build to clipboard">
          <span class="material-symbols-outlined" aria-hidden="true">content_copy</span>
        </button>
        <button class="btn-icon" id="btn-save" onclick="saveScreenshot()" aria-label="Save screenshot">
          <span class="material-symbols-outlined" aria-hidden="true">download</span>
        </button>
        <button class="btn-icon" id="btn-share" onclick="openShareModal()" aria-label="Share build code">
          <span class="material-symbols-outlined" aria-hidden="true">share</span>
        </button>
        <button class="btn-icon" id="btn-theme" onclick="toggleTheme()" aria-label="Toggle theme">
          <span class="material-symbols-outlined" id="theme-icon" aria-hidden="true">light_mode</span>
        </button>
        <button class="btn-icon" id="btn-left-hand" onclick="toggleLeftHanded()" aria-label="Toggle left-handed mode" aria-pressed="false">
          <span class="material-symbols-outlined" aria-hidden="true">back_hand</span>
        </button>
        <button class="btn-primary" id="btn-roll-all" onclick="rollDie()" aria-label="Roll all sections">
          <span class="roll-die-icon" id="roll-die-icon" aria-hidden="true"></span>
          <span class="sr-only">Roll</span>
        </button>
      </div>
    </header>

    <main id="main-content" class="app-container">
      <div class="controls-bar">
        <div class="view-toggle" role="group" aria-label="View mode">
          <button id="btn-expanded" class="active" onclick="setView('expanded')" aria-pressed="true">Expanded</button>
          <button id="btn-compressed" onclick="setView('compressed')" aria-pressed="false">Compressed</button>
        </div>
        <div class="mood-select">
          <span class="material-symbols-outlined" aria-hidden="true" style="color: var(--text-secondary)">tune</span>
          <label for="mood-filter" class="sr-only">Mood filter</label>
          <select id="mood-filter" onchange="setMood(this.value)">
            <option value="all">All Moods</option>
            <option value="corporate">Corporate Dystopia</option>
            <option value="post-apocalyptic">Post-Apocalyptic</option>
            <option value="ai-takeover">AI Takeover</option>
            <option value="political">Political Satire</option>
          </select>
        </div>
      </div>

      <div id="results-container" class="cards-grid">
        <!-- Cards are rendered by JS -->
      </div>
    </main>

    <div class="footer app-container">
      built with <span aria-label="love">♥</span> by <a href="https://nicojan.com" target="_blank" rel="noopener noreferrer" class="footer-link">Nico Jan</a>
    </div>
  </div>

  <!-- ===== SHARE MODAL ===== -->
  <div id="share-modal" class="modal-overlay" role="dialog" aria-labelledby="modal-title" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">SAVE YOUR BUILD</h2>
        <button class="btn-icon" onclick="closeShareModal()" aria-label="Close dialog">
          <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
      </div>
      <p class="text-caption" style="color: var(--text-secondary); margin-bottom: var(--space-md);">Your build code:</p>
      <textarea id="share-code" readonly aria-label="Build code"></textarea>
      <div class="modal-actions">
        <button class="btn-primary" onclick="copyShareCode()">
          <span class="material-symbols-outlined" aria-hidden="true">content_copy</span>
          Copy Code
        </button>
      </div>
    </div>
  </div>

  <!-- ===== CONFIRM DIALOG ===== -->
  <div id="confirm-overlay" class="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-msg">
    <div class="confirm-dialog">
      <p id="confirm-msg">Reset everything? This will clear your saved build.</p>
      <div class="confirm-actions">
        <button class="btn-secondary" onclick="closeConfirm()">Cancel</button>
        <button class="btn-primary" id="confirm-yes" onclick="executeReset()">Reset</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast" aria-live="assertive"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
